{% extends 'base.html' %}

{% block content %}

<div class="container mt-5" style="max-width: 620px;">

    <h2 class="mb-1">📄 Generar reporte PDF</h2>
    <p class="text-muted mb-4">
        Selecciona los filtros que quieras aplicar. Puedes combinarlos.
    </p>

    <form method="POST" action="{% url 'purchases:purchase_pdf' %}">
        {% csrf_token %}

        <div class="card shadow-sm mb-3">
            <div class="card-header fw-semibold">
                📅 Filtrar por fecha
            </div>
            <div class="card-body row g-3">
                <div class="col-md-6">
                    <label class="form-label">Desde</label>
                    <input type="date" name="start_date" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Hasta</label>
                    <input type="date" name="end_date" class="form-control">
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-3">
            <div class="card-header fw-semibold">
                🏢 Filtrar por proveedor
            </div>
            <div class="card-body">
                <label class="form-label">Proveedor</label>
                <input
                    type="text"
                    name="supplier"
                    class="form-control"
                    placeholder="Ej: Colombina"
                >
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header fw-semibold">
                📦 Filtrar por producto
            </div>
            <div class="card-body">
                <label class="form-label">Producto</label>
                <input
                    type="text"
                    name="product"
                    class="form-control"
                    placeholder="Ej: Arroz"
                >
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                ⬇ Descargar PDF
            </button>
            <a href="{% url 'purchases:purchase_list' %}" class="btn btn-outline-secondary">
                Cancelar
            </a>
        </div>

    </form>

</div>

{% endblock %}
