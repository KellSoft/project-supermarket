{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — Maná</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #F4F4F4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .wrap {
      display: flex;
      width: 100%;
      max-width: 480px;
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      overflow: hidden;
    }
    .left {
      width: 200px;
      background: #111c2d;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 32px 24px;
      flex-shrink: 0;
    }
    .left-brand { color: #F5F0E8; font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
    .left-tagline { color: rgba(245,240,232,0.25); font-size: 11px; margin-top: 4px; }
    .left-dots { display: flex; flex-direction: column; gap: 10px; margin: auto 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(245,240,232,0.12); }
    .dot.active { background: rgba(245,240,232,0.5); width: 20px; border-radius: 3px; }
    .left-footer { color: rgba(245,240,232,0.15); font-size: 10px; }
    .right {
      flex: 1;
      background: #fff;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .greeting { font-size: 22px; font-weight: 600; color: #0d0d0d; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 32px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.8px; }
    .field input { width: 100%; padding: 11px 14px; border: 1px solid #e5e5e5; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; color: #0d0d0d; outline: none; transition: border-color .15s; }
    .field input:focus { border-color: #111c2d; }
    .error { background: #FFF0F0; border: 1px solid #ffd0d0; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #c0392b; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
    .btn { width: 100%; padding: 12px; background: #111c2d; color: #F5F0E8; border: none; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s; margin-top: 4px; }
    .btn:hover { opacity: 0.85; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 20px 0 0; }
    .divider span { font-size: 11px; color: #ccc; white-space: nowrap; }
    .divider hr { flex: 1; border: none; border-top: 1px solid #f0f0f0; }
    .hint { text-align: center; font-size: 11px; color: #ccc; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div>
        <div class="left-brand">Maná</div>
        <div class="left-tagline">Sistema de gestión</div>
      </div>
      <div class="left-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="left-footer">v1.0</div>
    </div>
    <div class="right">
      <div class="greeting">Bienvenido</div>
      <div class="sub">Ingresa para continuar</div>

      {% if error %}
      <div class="error">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="field">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn">Entrar</button>
      </form>

      <div class="divider"><hr><span>Maná y Asociados</span><hr></div>
      <div class="hint">Acceso restringido al personal autorizado</div>
    </div>
  </div>
</body>
</html>
